<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Tournament')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white">
                        <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Create New Tournament</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger">
                            <span th:text="${error}"></span>
                        </div>

                        <form th:action="@{/organizer/tournaments/create}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Tournament Name *</label>
                                <input type="text" class="form-control" id="name" name="name"
                                       placeholder="e.g., Spring Championship 2026" required>
                            </div>
                            <div class="mb-3">
                                <label for="gameTitle" class="form-label">Game Title *</label>
                                <input type="text" class="form-control" id="gameTitle" name="gameTitle"
                                       placeholder="e.g., Valorant, CS2, League of Legends" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="format" class="form-label">Tournament Format *</label>
                                    <select class="form-select" id="format" name="format" required>
                                        <option value="">Select format</option>
                                        <option th:each="f : ${formats}" th:value="${f}" th:text="${f}">Format</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="teamSize" class="form-label">Team Size *</label>
                                    <input type="number" class="form-control" id="teamSize" name="teamSize"
                                           min="1" max="20" value="1" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="registrationStart" class="form-label">Registration Start *</label>
                                    <input type="date" class="form-control" id="registrationStart"
                                           name="registrationStart" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="registrationEnd" class="form-label">Registration End *</label>
                                    <input type="date" class="form-control" id="registrationEnd"
                                           name="registrationEnd" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="prizePool" class="form-label">Prize Pool ($) *</label>
                                <input type="number" class="form-control" id="prizePool" name="prizePool"
                                       min="0" step="0.01" value="0" required>
                            </div>
                            <div class="mb-3">
                                <label for="rules" class="form-label">Rules &amp; Guidelines</label>
                                <textarea class="form-control" id="rules" name="rules" rows="4"
                                          placeholder="Enter tournament rules and guidelines..."></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> Create Tournament
                                </button>
                                <a th:href="@{/organizer/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
