<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Browse Tournaments')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4">
        <h3 class="mb-4"><i class="bi bi-trophy"></i> All Tournaments</h3>

        <div class="row">
            <div th:each="t : ${tournaments}" class="col-md-6 col-lg-4 mb-4">
                <div class="card tournament-card" th:classappend="${t.status.name().toLowerCase()}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0" th:text="${t.name}">Tournament</h5>
                            <span class="badge" th:classappend="${'badge-' + t.status.name().toLowerCase()}"
                                  th:text="${t.status}">Status</span>
                        </div>
                        <p class="text-muted mb-2">
                            <i class="bi bi-controller"></i> <span th:text="${t.gameTitle}">Game</span>
                        </p>
                        <ul class="list-unstyled small">
                            <li><i class="bi bi-diagram-3"></i> Format: <strong th:text="${t.format}">Format</strong></li>
                            <li><i class="bi bi-people"></i> Team Size: <strong th:text="${t.teamSize}">1</strong></li>
                            <li><i class="bi bi-trophy"></i> Prize: <strong>$<span th:text="${t.prizePool}">0</span></strong></li>
                            <li><i class="bi bi-calendar"></i> Registration:
                                <span th:text="${t.registrationStart}">Start</span> -
                                <span th:text="${t.registrationEnd}">End</span>
                            </li>
                        </ul>
                        <a th:href="@{/player/tournaments/{id}(id=${t.tournamentId})}"
                           class="btn btn-primary btn-sm w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(tournaments)}" class="text-center text-muted py-5">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-2">No tournaments available yet.</p>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
