<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="bi bi-bell"></i> Notifications</h3>
            <form th:action="@{/player/notifications/read-all}" method="post" th:unless="${#lists.isEmpty(notifications)}">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-check-all"></i> Mark All as Read
                </button>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(notifications)}" class="text-center text-muted py-5">
            <i class="bi bi-bell-slash" style="font-size: 3rem;"></i>
            <p class="mt-2">No notifications yet.</p>
        </div>

        <div th:each="notif : ${notifications}" class="card mb-2"
             th:classappend="${notif.read ? '' : 'border-start border-primary border-3'}">
            <div class="card-body py-3">
                <div class="d-flex justify-content-between">
                    <p class="mb-0" th:text="${notif.message}">Notification message</p>
                    <small class="text-muted" th:text="${#temporals.format(notif.sentTime, 'MMM dd, HH:mm')}">Time</small>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
