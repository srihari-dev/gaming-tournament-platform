<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gaming Tournament Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-controller" style="font-size: 3rem; color: #6c5ce7;"></i>
                <h2>Create Account</h2>
                <p class="subtitle">Join the Gaming Tournament Platform</p>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Create a password" required minlength="6">
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role" required onchange="toggleExtra()">
                        <option value="">Select your role</option>
                        <option value="PLAYER">Player</option>
                        <option value="ORGANIZER">Organizer</option>
                    </select>
                </div>
                <div class="mb-3" id="extraField" style="display: none;">
                    <label for="extra" class="form-label" id="extraLabel">Extra Info</label>
                    <input type="text" class="form-control" id="extra" name="extra"
                           placeholder="">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="bi bi-person-plus"></i> Register
                </button>
            </form>

            <div class="text-center">
                <p class="mb-0">Already have an account?
                    <a th:href="@{/login}" style="color: #6c5ce7; font-weight: 600;">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleExtra() {
            var role = document.getElementById('role').value;
            var extraField = document.getElementById('extraField');
            var extraLabel = document.getElementById('extraLabel');
            var extraInput = document.getElementById('extra');

            if (role === 'PLAYER') {
                extraField.style.display = 'block';
                extraLabel.textContent = 'Gamer Tag';
                extraInput.placeholder = 'Enter your gamer tag';
                extraInput.required = true;
            } else if (role === 'ORGANIZER') {
                extraField.style.display = 'block';
                extraLabel.textContent = 'Organization Name';
                extraInput.placeholder = 'Enter your organization name';
                extraInput.required = true;
            } else {
                extraField.style.display = 'none';
                extraInput.required = false;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
