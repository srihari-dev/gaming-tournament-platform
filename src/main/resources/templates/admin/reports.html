<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reports & Analytics')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4">
        <h3 class="mb-4"><i class="bi bi-bar-chart"></i> Reports &amp; Analytics</h3>

        <!-- Overview Stats -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card stat-card">
                    <div class="stat-number" th:text="${userCount}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card green">
                    <div class="stat-number" th:text="${tournamentCount}">0</div>
                    <div class="stat-label">Total Tournaments</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card pink">
                    <div class="stat-number" th:text="${completedMatches}">0</div>
                    <div class="stat-label">Completed Matches</div>
                </div>
            </div>
        </div>

        <!-- Tournament Breakdown -->
        <div class="card mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0">Tournament Breakdown</h5>
            </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-md-4">
                        <div class="p-3">
                            <h2 class="text-warning" th:text="${upcomingCount}">0</h2>
                            <p class="text-muted">Upcoming</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="p-3">
                            <h2 class="text-info" th:text="${ongoingCount}">0</h2>
                            <p class="text-muted">Ongoing</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="p-3">
                            <h2 class="text-success" th:text="${completedTournaments}">0</h2>
                            <p class="text-muted">Completed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="window.print()" class="btn btn-outline-primary">
            <i class="bi bi-printer"></i> Print Report
        </button>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
