<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4">
        <h3 class="mb-4"><i class="bi bi-people"></i> Manage Users</h3>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}">1</td>
                                <td th:text="${user.name}">Name</td>
                                <td th:text="${user.email}">Email</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${user.role}">Role</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${user.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${user.status}">Status</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle-status(id=${user.userId})}"
                                          method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm"
                                                th:classappend="${user.status == 'ACTIVE' ? 'btn-outline-warning' : 'btn-outline-success'}"
                                                th:text="${user.status == 'ACTIVE' ? 'Suspend' : 'Activate'}">Toggle</button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this user?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
